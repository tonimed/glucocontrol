name: glucocontrol
description: Registro y seguimiento de glucosa en sangre con sincronización en la nube.
publish_to: 'none'
version: 2.5.0+5

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Backend — Supabase
  supabase_flutter: ^2.9.0

  # Estado — Riverpod
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegación
  go_router: ^14.8.1

  # Base de datos local (offline)
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0

  # Serialización
  json_annotation: ^4.9.0

  # Gráficas
  fl_chart: ^0.70.2

  # PDF + exportación
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^10.1.3

  # CSV
  csv: ^6.0.0

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

  # Conectividad
  connectivity_plus: ^6.1.4

  # Preferencias persistentes (hora del recordatorio)
  shared_preferences: ^2.3.3

  # Google Sign-In
  google_sign_in: ^6.2.2

  # Utilidades
  intl: ^0.19.0
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  drift_dev: ^2.23.1
  json_serializable: ^6.8.0
  mockito: ^5.4.5
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#C05A42"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Variable.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Variable.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Variable.ttf
          weight: 700
        - asset: assets/fonts/Nunito-Variable.ttf
          weight: 800
        - asset: assets/fonts/Nunito-Italic-Variable.ttf
          style: italic
          weight: 400
